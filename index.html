<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Riverbank Sauna</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Annotation plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.1"></script>

  <!-- Date adapter -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>

<div style="text-align:center; margin-top: 10px;">
  <img 
    src="https://cdn.prod.website-files.com/67a69bcd8ea1d3e93de21362/67a6f173e5784778a1161401_palmerstown-mills-logo-horizontal.svg" 
    alt="Logo"
    style="max-width: 300px; height: auto;"
  >
</div>

<div style="width: 90%; height: 400px; margin: auto;">
  <canvas id="myChart"></canvas>
</div>

<div style="width: 90%; margin: auto; text-align: center; margin-top: 10px;">
  <p id="lastUpdated" style="margin-top:5px;"></p>

  <p style="font-size: 9px;"><i>
    Data shown is for informational purposes only and may not be accurate.
  </i></p>
</div>

<script>
const channelID = 3023871;
const fieldNumber = 1;
const resultsCount = 500;
const refreshInterval = 300000;
const readAPIKey = "MOBXUAXGXG554IBK";

const url = `https://api.thingspeak.com/channels/${channelID}/fields/${fieldNumber}.json?api_key=${readAPIKey}&results=${resultsCount}`;

let chart;

Chart.register(window['chartjs-plugin-annotation']);

async function fetchData() {
  try {
    const response = await fetch(url);
    const data = await response.json();

    const filtered = data.feeds
      .map(entry => ({
        value: Number(entry[`field${fieldNumber}`]),
        date: new Date(entry.created_at)
      }))
      .filter(entry => !isNaN(entry.value));

    if (filtered.length > 0) {
      const lastEntry = filtered[filtered.length - 1];
      const lastDate = lastEntry.date;
      const temp = lastEntry.value;

      const dateStr = lastDate.toLocaleDateString();
      const timeStr = lastDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const now = new Date();
      const diffMinutes = Math.floor((now - lastDate) / 60000);

      const el = document.getElementById('lastUpdated');
      if (el) {
        el.innerHTML = `
          <span style="font-size:15px; font-weight:bold;">
          Temperature: ${temp} °C<br>
          Updated ${diffMinutes} mins ago<br>
          ${dateStr} at ${timeStr}
          </span>
        `;
      }
    }

    // Last 4 days
    const now = new Date();
    const cutoff = new Date(now);
    cutoff.setDate(now.getDate() - 4);

    const values = filtered
      .filter(entry => entry.date >= cutoff)
      .map(entry => ({ x: entry.date, y: entry.value }));

    updateChart(values);

  } catch (error) {
    console.error(error);
    document.getElementById('lastUpdated').innerText =
      "⚠ Unable to load data.";
  }
}

function createChart(values) {
  const ctx = document.getElementById('myChart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        // Glow dot
        {
          data: values.length ? [values[values.length - 1]] : [],
          pointRadius: 12,
          pointBackgroundColor: 'rgba(255,0,0,0.2)',
          borderWidth: 0,
          showLine: false
        },
        // Main line
        {
          label: 'Temperature',
          data: values,
          borderColor: 'blue',
          borderWidth: 2,
          tension: 0.3,
          parsing: false,

          pointRadius: ctx =>
            ctx.dataIndex === ctx.dataset.data.length - 1 ? 6 : 0,

          pointBackgroundColor: ctx =>
            ctx.dataIndex === ctx.dataset.data.length - 1 ? 'red' : 'transparent',

          pointBorderColor: ctx =>
            ctx.dataIndex === ctx.dataset.data.length - 1 ? 'white' : 'transparent',

          pointBorderWidth: ctx =>
            ctx.dataIndex === ctx.dataset.data.length - 1 ? 2 : 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'day',
            displayFormats: { day: 'MMM dd' }
          },
          title: {
            display: true,
            text: 'Date'
          }
        },
        y: {
          min: 0,
          max: 120,
          title: {
            display: true,
            text: 'Temperature (°C)'
          },
          ticks: {
            stepSize: 10,
            callback: value => value + ' °C'
          }
        }
      },
      plugins: {
        legend: { display: false },
        annotation: {
          annotations: {
            hotLine: {
              type: 'line',
              yMin: 70,
              yMax: 70,
              borderColor: 'green',
              borderWidth: 2,
              label: { display: true, content: 'Hot', position: 'start' }
            },
            veryHotLine: {
              type: 'line',
              yMin: 90,
              yMax: 90,
              borderColor: 'red',
              borderWidth: 2,
              label: { display: true, content: 'Very Hot', position: 'start' }
            }
          }
        },
        tooltip: {
          displayColors: false,
          callbacks: {
            title: () => '',
            label: function(context) {
              const date = new Date(context.parsed.x);
              return [
                date.toLocaleDateString(),
                date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                `Temp: ${context.parsed.y} °C`
              ];
            }
          }
        }
      }
    }
  });
}

function updateChart(values) {
  if (!chart) {
    createChart(values);
  } else {
    // Correct dataset order
    chart.data.datasets[1].data = values;
    chart.data.datasets[0].data = values.length ? [values[values.length - 1]] : [];
    chart.update();
  }
}

// Initial load
fetchData();

// Auto refresh
setInterval(fetchData, refreshInterval);
</script>

</body>
</html>
